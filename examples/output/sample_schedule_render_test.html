<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sample Schedule</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: rgba(255,255,255,0.84);
      --text: #122033;
      --muted: #5d6b82;
      --line: #dbe4ef;
      --accent: #0f7bff;
      --shadow: 0 18px 40px rgba(25, 45, 72, 0.10);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15,123,255,0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(36,99,235,0.10), transparent 24%),
        linear-gradient(180deg, #eef4fb 0%, var(--bg) 100%);
    }
    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px 28px;
      margin-bottom: 20px;
    }
    .hero h1 {
      margin: 0;
      font-size: 30px;
    }
    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
    }
    .date-strip {
      display: grid;
      gap: 8px;
      grid-template-columns: 220px repeat(3, minmax(120px, 1fr));
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
      padding-top: 8px;
      background: linear-gradient(180deg, rgba(244,247,251,0.96), rgba(244,247,251,0.75));
      backdrop-filter: blur(10px);
    }
    .date-cell, .date-label {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      font-weight: 700;
    }
    .date-cell.today {
      color: var(--accent);
      border-color: rgba(15,123,255,0.35);
      box-shadow: inset 0 -3px 0 rgba(15,123,255,0.45);
    }
    .machine-section {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      margin-bottom: 12px;
    }
    .machine-title {
      position: sticky;
      left: 0;
      top: 76px;
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      background: rgba(248,250,252,0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-weight: 700;
      box-shadow: var(--shadow);
    }
    .machine-lanes {
      display: grid;
      gap: 8px;
    }
    .lane-grid {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-radius: var(--radius);
      background: rgba(255,255,255,0.66);
      border: 1px solid rgba(219,228,239,0.8);
      min-height: 84px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .task-card {
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid rgba(17,24,39,0.08);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      min-height: 64px;
    }
    .task-lines {
      font-weight: 700;
      line-height: 1.35;
      color: #111827;
    }
    .task-lines div:nth-child(2) {
      color: #2563eb;
      font-size: 0.95em;
    }
    .task-lines div:nth-child(3) {
      color: #dc2626;
      font-size: 0.9em;
    }
    .task-card footer {
      margin-top: 8px;
      color: rgba(17,24,39,0.66);
      font-size: 12px;
    }
    @media (max-width: 900px) {
      .page { padding: 12px; }
      .date-strip, .machine-section {
        grid-template-columns: 1fr;
      }
      .machine-title {
        position: static;
        min-height: auto;
      }
      .lane-grid {
        overflow-x: auto;
      }
      .task-card {
        min-width: 180px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Sample Schedule</h1>
      <p>生成时间：2026-04-24T10:00:00</p>
    </section>
    <section class="date-strip">
      <div class="date-label">机台 / 日期</div>
      <div class="date-cell"><span>1/16 周五</span></div>
<div class="date-cell today"><span>1/17 周六</span></div>
<div class="date-cell"><span>1/18 周日</span></div>
    </section>
    
            <section class="machine-section">
              <div class="machine-title">1#?</div>
              <div class="machine-lanes">
                
                <div class="lane-grid" style="grid-template-columns: repeat(3, minmax(120px, 1fr));">
                  
                    <article class="task-card" style="grid-column:1 / span 1; background:rgb(226, 230, 238);">
                      <div class="task-lines"><div>??A</div><div>5T ???</div></div>
                      <footer>2026-01-17 - 2026-01-17</footer>
                    </article>
                    
                </div>
                
              </div>
            </section>
            
            <section class="machine-section">
              <div class="machine-title">2#?</div>
              <div class="machine-lanes">
                
                <div class="lane-grid" style="grid-template-columns: repeat(3, minmax(120px, 1fr));">
                  
                    <article class="task-card" style="grid-column:1 / span 2; background:rgb(228, 224, 221);">
                      <div class="task-lines"><div>??B</div><div>9T ???</div><div>??</div></div>
                      <footer>2026-01-16 - 2026-01-17</footer>
                    </article>
                    
                </div>
                
              </div>
            </section>
            
  </main>
</body>
</html>
